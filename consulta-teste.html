<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Horários Docentes — IFCE Canindé</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2eb;--card:#fff;--g1:#14532d;--g2:#166534;--g3:#22c55e;--g4:#86efac;--gbg:#f0fdf4;--gold:#eab308;--blue:#1d4ed8;--bluebg:#dbeafe;--bluelight:#3b82f6;--attgreen:#15803d;--attbg:#dcfce7;--txt:#1a1a1a;--txt2:#6b7280;--bdr:#e5e7eb;--r:12px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04)}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;padding-bottom:40px}
.hdr{background:var(--g1);color:#fff;padding:20px 16px 44px;text-align:center;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:-30px;left:-20px;right:-20px;height:60px;background:var(--bg);border-radius:50% 50% 0 0}
.hdr-badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:500;letter-spacing:.5px;margin-bottom:10px;backdrop-filter:blur(4px)}
.hdr h1{font-family:'Fraunces',serif;font-size:22px;font-weight:700;letter-spacing:-.3px;line-height:1.3}
.hdr p{font-size:12px;opacity:.7;margin-top:4px}
.ctn{max-width:520px;margin:0 auto;padding:0 14px}
.search-wrap{margin-top:-12px;position:relative;z-index:2}
.search-box{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;border:2px solid transparent;transition:border-color .2s}
.search-box:focus-within{border-color:var(--g3)}
.search-box label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
.search-box input{width:100%;border:none;outline:none;font-size:16px;font-family:inherit;color:var(--txt);background:transparent;padding:4px 0}
.search-box input::placeholder{color:#c4c8cc}
.results{margin-top:10px}
.res-item{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:6px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:transform .1s;border:1px solid var(--bdr)}
.res-item:hover{transform:translateY(-1px)}.res-item:active{transform:scale(.98)}
.res-avatar{width:38px;height:38px;border-radius:50%;background:var(--g1);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:15px;flex-shrink:0}
.res-info{flex:1;min-width:0}.res-name{font-weight:600;font-size:14px}.res-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.grade-view{margin-top:16px;display:none}.grade-view.active{display:block}
.prof-card{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--bdr)}
.prof-back{font-size:12px;color:var(--bluelight);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:12px;font-weight:500}
.prof-back:hover{text-decoration:underline}
.prof-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.prof-av-lg{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:22px;flex-shrink:0}
.prof-nm{font-family:'Fraunces',serif;font-size:20px;font-weight:700;line-height:1.2}.prof-campus{font-size:12px;color:var(--txt2);margin-top:2px}
.prof-stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ps-item{background:var(--gbg);border:1px solid #d1fae5;border-radius:8px;padding:8px 12px;text-align:center;flex:1;min-width:80px}
.ps-val{font-size:18px;font-weight:700;color:var(--g1)}.ps-lbl{font-size:10px;color:var(--txt2);margin-top:2px}
.disc-list{margin-bottom:14px}
.disc-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.disc-item:last-child{border:none}
.disc-nome{font-weight:500}.disc-turma{font-size:11px;color:var(--txt2)}.disc-ch{font-weight:700;color:var(--g1);font-size:12px}
.grade-tbl{width:100%;border-collapse:collapse;font-size:10px}
.grade-tbl th{background:var(--g1);color:#fff;padding:8px 3px;font-weight:600;font-size:10px;text-align:center}
.grade-tbl td{padding:3px 2px;border:1px solid var(--bdr);text-align:center;vertical-align:top;height:36px}
.grade-tbl .sl{background:var(--gbg);font-weight:600;color:var(--g1);font-size:9px;width:58px;text-align:left;padding-left:4px}
.gc{min-height:30px;border-radius:4px;padding:2px;font-size:8px;line-height:1.2}
.gc.aula{background:var(--bluebg);color:var(--blue);border:1px solid #93c5fd}
.gc.att{background:var(--attbg);color:var(--attgreen);border:1px solid #86efac}
.gc .dn{font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
.gc .tn{font-size:7px;opacity:.7;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
.sync-bar{margin-top:8px;text-align:center;font-size:11px;padding:6px;border-radius:var(--r)}
.loading{text-align:center;padding:40px;color:var(--txt2);font-size:14px}
.sem-badge{display:inline-block;background:var(--gbg);color:var(--g1);border:1px solid #86efac;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
@media(max-width:400px){.grade-tbl{font-size:8px}.gc .dn{max-width:60px}.gc .tn{max-width:60px}}
</style>
</head>
<body>

<div class="hdr">
<div class="hdr-badge">IFCE Campus Canindé</div>
<h1>Horários dos Docentes</h1>
<p>Consulta de aulas e atendimento</p>
<div class="sem-badge" id="semBadge">Carregando...</div>
</div>

<div class="ctn">
<div class="search-wrap">
<div class="search-box">
<label>🔍 Buscar Professor</label>
<input type="text" id="searchInput" placeholder="Digite o nome do professor..." oninput="doSearch()">
</div>
</div>

<div class="results" id="results"></div>

<div class="grade-view" id="gradeView">
<div class="prof-card" id="profCard"></div>
</div>

<div class="sync-bar" id="syncStatus" style="color:var(--txt2)">⏳ Conectando ao Firebase...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
import { getFirestore, doc, getDoc, collection, query, where, getDocs, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

// ============================================================
// 🔧 COLE SEU firebaseConfig AQUI (mesmo do admin)
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAhaMmUr3MeO4_ctzgBrS5AIG8MehE6cZ8",
  authDomain: "pit-rit-horarios.firebaseapp.com",
  projectId: "pit-rit-horarios",
  storageBucket: "pit-rit-horarios.firebasestorage.app",
  messagingSenderId: "739278051497",
  appId: "1:739278051497:web:1fd7f0adabe9e65ea971b8"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const esc = s => !s ? '' : String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;');

let LIVE = {};
let currentProf = null;
let semestreVigente = '';

// ===================== LÓGICA PRINCIPAL =====================
// 1. Ler semestre vigente de configuracoes/status
// 2. Buscar horários filtrados por esse semestre
// 3. Exibir para o aluno (sem escolha de semestre)

async function init() {
  try {
    // PASSO 1: Ler semestre vigente
    const statusDoc = await getDoc(doc(db, 'configuracoes', 'status'));
    if (statusDoc.exists() && statusDoc.data().vigente) {
      semestreVigente = statusDoc.data().vigente;
      $('semBadge').textContent = '📅 Semestre ' + semestreVigente;
    } else {
      $('semBadge').textContent = '⚠️ Nenhum semestre definido';
      $('syncStatus').innerHTML = '⚠️ O administrador precisa definir o semestre vigente no painel admin.';
      $('syncStatus').style.color = '#f59e0b';
      // Fallback: tenta carregar tudo sem filtro de semestre
      await loadAllHorarios();
      return;
    }

    // PASSO 2: Buscar horários do semestre vigente
    await loadHorariosBySemestre(semestreVigente);

  } catch(e) {
    console.error('Erro na inicialização:', e);
    $('syncStatus').innerHTML = '❌ Erro: ' + e.message;
    $('syncStatus').style.color = '#ef4444';
    // Fallback: tenta carregar todos
    await loadAllHorarios();
  }
}

async function loadHorariosBySemestre(sem) {
  try {
    // Query filtrando por semestre
    const q = query(collection(db, 'horarios'), where('semestre', '==', sem));
    const snap = await getDocs(q);

    let count = 0;
    snap.forEach(d => {
      const data = d.data();
      if (data.nome) { LIVE[data.nome] = data; count++; }
    });

    if (count === 0) {
      // Pode ser que os dados antigos não tenham campo semestre
      // Fallback: carrega tudo da coleção horarios
      await loadAllHorarios();
      return;
    }

    $('syncStatus').innerHTML = `● Semestre ${sem} — ${count} docentes carregados`;
    $('syncStatus').style.color = '#22c55e';

    // Listener para atualizações em tempo real
    onSnapshot(q, snap => {
      snap.forEach(d => {
        const data = d.data();
        if (data.nome) LIVE[data.nome] = data;
      });
      if (currentProf && LIVE[currentProf]) showProf(currentProf);
    });

  } catch(e) {
    console.error('Erro carregando horários por semestre:', e);
    await loadAllHorarios();
  }
}

async function loadAllHorarios() {
  // Fallback: carrega todos os documentos (compatibilidade com dados sem campo semestre)
  try {
    const snap = await getDocs(collection(db, 'horarios'));
    let count = 0;
    snap.forEach(d => {
      const data = d.data();
      if (data.nome) { LIVE[data.nome] = data; count++; }
    });
    $('syncStatus').innerHTML = `● ${count} docentes carregados (todos os semestres)`;
    $('syncStatus').style.color = '#22c55e';

    // Real-time listener
    onSnapshot(collection(db, 'horarios'), snap => {
      snap.forEach(d => {
        const data = d.data();
        if (data.nome) LIVE[data.nome] = data;
      });
      if (currentProf && LIVE[currentProf]) showProf(currentProf);
    });
  } catch(e) {
    $('syncStatus').innerHTML = '❌ Erro: ' + e.message;
    $('syncStatus').style.color = '#ef4444';
  }
}

// ===================== SEARCH =====================
window.doSearch = function() {
  const q = $('searchInput').value.trim().toLowerCase();
  const res = $('results');
  $('gradeView').classList.remove('active');
  currentProf = null;

  if (q.length < 2) { res.innerHTML = ''; return; }

  const names = Object.keys(LIVE).filter(n => n.toLowerCase().includes(q)).sort((a,b) => a.localeCompare(b,'pt'));
  if (names.length === 0) {
    res.innerHTML = '<div style="text-align:center;padding:20px;color:var(--txt2);font-size:13px">Nenhum professor encontrado.</div>';
    return;
  }

  res.innerHTML = names.slice(0, 15).map(n => {
    const d = LIVE[n];
    const init = n.split(' ').map(w => w[0]).filter(c => c && c === c.toUpperCase()).slice(0, 2).join('');
    const nDisc = (d.disciplinas || []).length;
    return `<div class="res-item" onclick="showProf('${esc(n)}')">
      <div class="res-avatar">${init}</div>
      <div class="res-info">
        <div class="res-name">${esc(n)}</div>
        <div class="res-sub">${nDisc} disciplina${nDisc !== 1 ? 's' : ''} · ${d.total_aulas || 0} aulas/sem</div>
      </div>
    </div>`;
  }).join('');
};

// ===================== SHOW PROFESSOR =====================
const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta'];
const SLOTS = [
  {l:'AB Manhã',h:'07:45-08:45',i:'07:45',f:'08:45'},{l:'',h:'08:45-09:45',i:'08:45',f:'09:45'},
  {l:'CD Manhã',h:'10:00-11:00',i:'10:00',f:'11:00'},{l:'',h:'11:00-12:00',i:'11:00',f:'12:00'},
  {l:'AB Tarde',h:'13:45-14:45',i:'13:45',f:'14:45'},{l:'',h:'14:45-15:45',i:'14:45',f:'15:45'},
  {l:'CD Tarde',h:'16:00-17:00',i:'16:00',f:'17:00'},{l:'',h:'17:00-18:00',i:'17:00',f:'18:00'},
  {l:'AB Noite',h:'18:30-19:20',i:'18:30',f:'19:20'},{l:'',h:'19:20-20:10',i:'19:20',f:'20:10'},
  {l:'CD Noite',h:'20:30-21:20',i:'20:30',f:'21:20'},{l:'',h:'21:20-22:00',i:'21:20',f:'22:00'}
];

window.showProf = function(name) {
  const d = LIVE[name];
  if (!d) return;
  currentProf = name;
  $('results').innerHTML = '';

  const init = name.split(' ').map(w => w[0]).filter(c => c && c === c.toUpperCase()).slice(0, 2).join('');
  const discs = d.disciplinas || [];
  const grade = d.grade || {};

  // Count atendimentos
  let attCount = 0;
  DIAS.forEach(dia => {
    (grade[dia] || []).forEach(b => { if (b.tipo === 'atendimento' || b.tp === 'atendimento') attCount++; });
  });

  let html = `<div class="prof-back" onclick="backToSearch()">← Voltar à busca</div>
  <div class="prof-header">
    <div class="prof-av-lg">${init}</div>
    <div><div class="prof-nm">${esc(name)}</div><div class="prof-campus">📍 ${esc(d.campus || 'Canindé')}${semestreVigente ? ' · Semestre ' + semestreVigente : ''}</div></div>
  </div>
  <div class="prof-stats">
    <div class="ps-item"><div class="ps-val">${d.total_aulas || 0}</div><div class="ps-lbl">Aulas/sem</div></div>
    <div class="ps-item"><div class="ps-val">${discs.length}</div><div class="ps-lbl">Disciplinas</div></div>
    <div class="ps-item"><div class="ps-val">${attCount}</div><div class="ps-lbl">Atendimentos</div></div>
  </div>`;

  // Disciplinas
  if (discs.length > 0) {
    html += '<div style="font-size:12px;font-weight:700;color:var(--g1);margin-bottom:6px">📚 Disciplinas</div><div class="disc-list">';
    discs.forEach(disc => {
      const nome = disc.nome || disc.n || '';
      const turma = disc.turma || disc.t || '—';
      const ch = disc.ch || disc.c || 0;
      html += `<div class="disc-item"><div><span class="disc-nome">${esc(nome)}</span><br><span class="disc-turma">${esc(turma)}</span></div><span class="disc-ch">${ch}h</span></div>`;
    });
    html += '</div>';
  }

  // Grade semanal
  html += '<div style="font-size:12px;font-weight:700;color:var(--g1);margin:14px 0 8px">📅 Grade Semanal</div>';
  html += '<div style="overflow-x:auto"><table class="grade-tbl"><thead><tr><th>Horário</th>';
  DIAS.forEach(d => html += '<th>' + d.substring(0, 3) + '</th>');
  html += '</tr></thead><tbody>';

  SLOTS.forEach(s => {
    html += '<tr><td class="sl">' + (s.l ? '<b>' + s.l + '</b><br>' : '') + s.i + '-' + s.f + '</td>';
    DIAS.forEach(dia => {
      const bs = grade[dia] || [];
      const b = bs.find(x => {
        const bi = x.inicio || x.i;
        const bf = x.fim || x.f;
        return bi === s.i && bf === s.f;
      });
      if (b) {
        const isAtt = (b.tipo || b.tp) === 'atendimento';
        const ativ = b.atividade || b.a || '';
        const parts = ativ.split(' — ');
        html += `<td><div class="gc ${isAtt ? 'att' : 'aula'}"><span class="dn">${isAtt ? 'Atendimento' : esc(parts[0])}</span><span class="tn">${isAtt ? 'a alunos' : esc(parts[1] || b.turma || b.t || '')}</span></div></td>`;
      } else {
        html += '<td></td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Última atualização
  if (d.atualizado) {
    html += '<div style="text-align:right;font-size:10px;color:var(--txt2);margin-top:8px">Atualizado: ' + new Date(d.atualizado).toLocaleString('pt-BR') + '</div>';
  }

  $('profCard').innerHTML = html;
  $('gradeView').classList.add('active');
};

window.backToSearch = function() {
  $('gradeView').classList.remove('active');
  currentProf = null;
  window.doSearch();
};

// ===================== INIT =====================
init();

</script>
</body>
</html>
